seed: 42
device: cuda
log_file: outputs/logs/default.log

batch_size: 2
num_workers: 0
val_ratio: 0.2
augment: true
lr: 0.0002
betas: [0.5, 0.999]

model:
  in_channels: 1
  out_channels: 1
  base_channels: 24
  num_levels: 2
  blocks_per_level: 2
  shuffle_factor: 3

loss_weights:
  reconstruction: 0.8
  guidance: 0.5
  edge: 0.05
  tv: 0.01

trainer:
  epochs: 15
  grad_clip:
  log_interval: 10
  checkpoint_dir: checkpoints/default

dataset:
  volume_path: data/raw/volume.npy
  patch_size: [108, 108, 108]
  stride: [54, 54, 54]
  normalize: true
  gaussian_sigma: 1.0
  bilateral_kernel_size: 5
  bilateral_sigma_spatial: 2.0
  bilateral_sigma_intensity: 0.1

input_path: data/raw/volume.npy
output_path: outputs/denoised/volume_denoised.npy
checkpoint_path: checkpoints/default/best.pt
patch_size: [108, 108, 108]
stride: [54, 54, 54]
normalize: true

