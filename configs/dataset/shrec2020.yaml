name: shrec2020
description: Simulated Cryo-ET data from SHREC2020 with AWGN corruption.

dataset:
  volume_path: data/raw/shrec2020/sample_volume.npy
  patch_size: [108, 108, 108]
  stride: [54, 54, 54]
  normalize: true
  gaussian_sigma: 1.0
  bilateral_kernel_size: 5
  bilateral_sigma_spatial: 2.0
  bilateral_sigma_intensity: 0.1

evaluation:
  metrics: [psnr, ssim]
  has_ground_truth: true
  ground_truth_path: data/raw/shrec2020/sample_gt.npy

preprocess:
  gaussian_sigma: 1.0
  bilateral_kernel_size: 5
  bilateral_sigma_spatial: 2.0
  bilateral_sigma_intensity: 0.1

